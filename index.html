<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Solfeo - ¡Aventura Musical!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root {
            --bg-color: #fff9c4; 
            --surface: #ffffff;
            --text-main: #2c3e50;
            --btn-lvl1: #43B047; /* Verde Mario */
            --btn-lvl2: #FBD000; /* Amarillo Mario */
            --btn-lvl3: #E52521; /* Rojo Mario */
            --accent: #049CD8;   /* Azul Mario */
            --wildcard: #9c27b0; /* Morado mágico */
            --border-radius: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#fff176 15%, transparent 15%);
            background-size: 30px 30px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 0px #fbc02d, 0 25px 40px rgba(0,0,0,0.1);
            border: 5px solid #fff;
            width: 100%;
            max-width: 950px;
            text-align: center;
        }

        /* --- PANTALLA DE REGISTRO --- */
        #registro-estudiante {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .input-mario {
            padding: 15px 25px;
            font-size: 1.2rem;
            border: 3px solid #000;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            width: 80%;
            max-width: 400px;
            text-align: center;
            outline: none;
        }

        /* --- ESTILO SUPER MARIO PARA EL TÍTULO --- */
        h1.mario-title { 
            font-family: 'Fredoka', sans-serif; 
            font-weight: 900; 
            font-size: 4.5rem; 
            margin-bottom: 0.5rem; 
            letter-spacing: 2px;
            line-height: 1.1;
            text-shadow: 
                -4px -4px 0 #000,  
                 4px -4px 0 #000,
                -4px  4px 0 #000,
                 4px  4px 0 #000,
                 0px  6px 0 #000,
                 0px 15px 10px rgba(0,0,0,0.3);
        }

        .mario-title span { display: inline-block; }
        .mario-title span:nth-child(even) { transform: rotate(3deg) translateY(-3px); }
        .mario-title span:nth-child(odd) { transform: rotate(-3deg) translateY(3px); }

        .m-red { color: #E52521; }
        .m-blue { color: #049CD8; }
        .m-yellow { color: #FBD000; }
        .m-green { color: #43B047; }

        p.subtitle { 
            font-weight: 900; 
            color: #546e7a; 
            margin-top: 10px;
            margin-bottom: 2rem; 
            font-size: 1.4rem; 
        }

        .difficulty-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
        }

        .diff-btn {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            top: 0;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            border: 3px solid #000;
            box-shadow: 0 6px 0px #000;
        }

        .btn-l1 { background-color: var(--btn-lvl1); }
        .btn-l2 { background-color: var(--btn-lvl2); }
        .btn-l3 { background-color: var(--btn-lvl3); }

        .diff-btn:active, .diff-btn.active {
            top: 6px;
            box-shadow: 0 0px 0px #000;
        }

        #game-content { display: none; } /* Oculto inicialmente */

        #game-area {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        #score-container {
            width: 100%;
            background: #fff;
            padding: 30px 10px;
            margin: 2rem 0;
            border: 6px solid #000;
            border-radius: var(--border-radius);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            overflow-x: auto;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 60px;
        }

        .btn-main {
            border: 3px solid #000;
            padding: 16px 32px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: 'Fredoka', sans-serif;
            color: white;
            position: relative;
            top: 0;
            text-shadow: 1px 1px 0 #000;
        }

        .btn-refresh { background-color: var(--accent); box-shadow: 0 8px 0px #000; }
        .btn-wildcard { background-color: var(--wildcard); box-shadow: 0 8px 0px #000; }

        .btn-main:active { top: 8px; box-shadow: 0 0px 0px #000; }

        .btn-wildcard.poof {
            animation: vanishMagic 0.6s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
            pointer-events: none;
        }

        @keyframes vanishMagic {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0) rotate(180deg); opacity: 0; }
        }

        .credito-profesor {
            margin-top: 2rem;
            font-weight: 900;
            font-size: 1.2rem;
            color: #546e7a;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1 class="mario-title">
        <span class="m-red">S</span><span class="m-blue">U</span><span class="m-yellow">P</span><span class="m-green">E</span><span class="m-red">R</span><br>
        <span class="m-green">S</span><span class="m-blue">O</span><span class="m-red">L</span><span class="m-yellow">F</span><span class="m-green">E</span><span class="m-blue">O</span>
    </h1>

    <div id="registro-estudiante">
        <p class="subtitle">¡Hola! Antes de empezar, dinos tu nombre:</p>
        <form id="form-inicio" style="width: 100%;">
            <input type="text" id="nombre-niño" name="Nombre" class="input-mario" placeholder="Escribe tu nombre aquí..." required>
            <br><br>
            <button type="submit" id="btn-comenzar" class="btn-main btn-refresh" style="background-color: #43B047;">
                ¡Comenzar Misión! 🚀
            </button>
        </form>
    </div>

    <div id="game-content">
        <p class="subtitle" id="level-description">¡Elige un nivel para tu misión musical!</p>

        <div class="difficulty-selector">
            <button class="diff-btn btn-l1" onclick="startGame(1)">🍄 Nivel 1</button>
            <button class="diff-btn btn-l2" onclick="startGame(2)">⭐ Nivel 2</button>
            <button class="diff-btn btn-l3" onclick="startGame(3)">🔥 Nivel 3</button>
        </div>

        <div id="game-area">
            <div id="score-container"></div>
            <div class="action-buttons">
                <button class="btn-main btn-refresh" onclick="renderNewExercise()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="black" stroke-width="1"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h6V3h-8z"/></svg>
                    ¡Nueva Canción!
                </button>
                <button class="btn-main btn-wildcard" id="wildcard-btn" onclick="applyWildcard()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    ¡Pista Mágica!
                </button>
            </div>
        </div>
    </div>
    
    <div class="credito-profesor">
        Creado por Profesor Matías Poblete
    </div>
</div>

<script>
    // --- LÓGICA DE FORMSUBMIT ---
    const formInicio = document.getElementById('form-inicio');
    const registroDiv = document.getElementById('registro-estudiante');
    const juegoDiv = document.getElementById('game-content');

    formInicio.addEventListener('submit', function(e) {
        e.preventDefault();
        const nombre = document.getElementById('nombre-niño').value;
        const btn = document.getElementById('btn-comenzar');
        
        btn.innerText = "Cargando...";
        btn.disabled = true;

        // Envío silencioso a tu correo
        fetch("https://formsubmit.co/ajax/matias.poblete@slepcolchagua.cl", {
            method: "POST",
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({
                Estudiante: nombre,
                Accion: "Inició el juego de Solfeo",
                _subject: "Nuevo Estudiante: " + nombre
            })
        })
        .then(() => {
            // Transición al juego
            registroDiv.style.display = 'none';
            juegoDiv.style.display = 'block';
        })
        .catch(err => {
            console.error(err);
            // Si falla el internet, igual dejamos entrar al niño para no frustrarlo
            registroDiv.style.display = 'none';
            juegoDiv.style.display = 'block';
        });
    });

    // --- LÓGICA ORIGINAL DEL JUEGO ---
    const { Renderer, Stave, StaveNote, Beam, Formatter, Annotation } = Vex.Flow;

    const difficultyConfig = {
        1: { pitches: ["c/4", "d/4", "e/4", "f/4", "g/4"], figures: ['h', 'q'], desc: "¡Misión: Notas lentas! 🐢" },
        2: { pitches: ["c/4", "d/4", "e/4", "f/4", "g/4", "a/4", "b/4", "c/5"], figures: ['h', 'q', 'qr'], desc: "¡Misión: Saltos y silencios! 🤫" },
        3: { pitches: ["c/4", "d/4", "e/4", "f/4", "g/4", "a/4", "b/4", "c/5", "d/5", "e/5", "f/5", "g/5"], figures: ['h', 'q', 'qr', '88'], desc: "¡Misión: Velocidad Sónica! ⚡" }
    };

    const noteNamesES = { "c": "Do", "d": "Re", "e": "Mi", "f": "Fa", "g": "Sol", "a": "La", "b": "Si" };

    let currentDifficulty = 1;
    let hasStarted = false;
    let currentMeasuresData = []; 

    function startGame(level) {
        if (!hasStarted) {
            document.getElementById('game-area').style.display = 'flex';
            hasStarted = true;
        }
        setDifficulty(level);
    }

    function setDifficulty(level) {
        currentDifficulty = level;
        document.querySelectorAll('.diff-btn').forEach((btn, i) => {
            btn.classList.toggle('active', (i + 1) === level);
        });
        document.getElementById('level-description').textContent = difficultyConfig[level].desc;
        renderNewExercise();
    }

    function getRandomPitch() {
        const pool = difficultyConfig[currentDifficulty].pitches;
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function generateMeasureData() {
        let beatsLeft = 4;
        let notes = [];
        const allowed = difficultyConfig[currentDifficulty].figures;

        while (beatsLeft > 0) {
            let available = allowed.filter(f => (f==='h' ? beatsLeft>=2 : beatsLeft>=1));
            let choice = available[Math.floor(Math.random() * available.length)];

            if (choice === 'h') {
                notes.push({ keys: [getRandomPitch()], duration: "h" });
                beatsLeft -= 2;
            } else if (choice === 'q') {
                notes.push({ keys: [getRandomPitch()], duration: "q" });
                beatsLeft -= 1;
            } else if (choice === 'qr') {
                notes.push({ keys: ["b/4"], duration: "qr", isRest: true });
                beatsLeft -= 1;
            } else if (choice === '88') {
                notes.push({ keys: [getRandomPitch()], duration: "8", partOfBeam: true });
                notes.push({ keys: [getRandomPitch()], duration: "8", partOfBeam: true });
                beatsLeft -= 1;
            }
        }
        return notes;
    }

    function renderNewExercise() {
        currentMeasuresData = [generateMeasureData(), generateMeasureData(), generateMeasureData(), generateMeasureData()];
        drawScore();
        const wildcardBtn = document.getElementById('wildcard-btn');
        wildcardBtn.classList.remove('poof');
        wildcardBtn.style.display = 'inline-flex';
    }

    function applyWildcard() {
        const wildcardBtn = document.getElementById('wildcard-btn');
        if (wildcardBtn.classList.contains('poof')) return;

        let allNotes = [];
        currentMeasuresData.forEach((m, mIdx) => {
            m.forEach((n, nIdx) => {
                if (!n.isRest) allNotes.push({ mIdx, nIdx });
            });
        });

        currentMeasuresData.forEach(m => m.forEach(n => delete n.showHint));
        
        for(let i=0; i<3; i++) {
            if(allNotes.length === 0) break;
            let randIdx = Math.floor(Math.random() * allNotes.length);
            let pick = allNotes.splice(randIdx, 1)[0];
            currentMeasuresData[pick.mIdx][pick.nIdx].showHint = true;
        }

        drawScore();
        wildcardBtn.classList.add('poof');
        setTimeout(() => { wildcardBtn.style.display = 'none'; }, 600);
    }

    function drawScore() {
        const container = document.getElementById("score-container");
        container.innerHTML = ""; 
        const renderer = new Renderer(container, Renderer.Backends.SVG);
        renderer.resize(850, 200);
        const context = renderer.getContext();
        let x = 10;

        currentMeasuresData.forEach((measureNotes, i) => {
            let w = (i === 0) ? 240 : 200;
            const stave = new Stave(x, 40, w);
            if (i === 0) stave.addClef("treble").addTimeSignature("4/4");
            if (i === 3) stave.setEndBarType(Vex.Flow.Barline.type.END);
            stave.setContext(context).draw();

            let vfNotes = [];
            let tempBeamNotes = [];
            let beams = [];

            measureNotes.forEach(n => {
                const sn = new StaveNote({ keys: n.keys, duration: n.duration });
                if (n.showHint) {
                    let letter = n.keys[0].split("/")[0];
                    let name = noteNamesES[letter];
                    sn.addModifier(new Annotation(name).setVerticalJustification(3).setFont("Nunito", 14, "bold")); 
                }
                vfNotes.push(sn);
                if (n.partOfBeam) {
                    tempBeamNotes.push(sn);
                    if (tempBeamNotes.length === 2) {
                        beams.push(new Beam(tempBeamNotes));
                        tempBeamNotes = [];
                    }
                }
            });

            Formatter.FormatAndDraw(context, stave, vfNotes);
            beams.forEach(b => b.setContext(context).draw());
            x += w;
        });
    }
</script>
</body>
</html>
